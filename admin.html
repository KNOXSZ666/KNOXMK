<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOX Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#8b5cf6;--primary-light:#a78bfa;--accent:#c084fc;--gradient:linear-gradient(135deg,#06b6d4,#8b5cf6,#c084fc);--bg-dark:#0a0a0f;--bg-card:#13131a;--text:#e2e8f0;--text-dim:#94a3b8;--text-bright:#f8fafc;--border:rgba(139,92,246,0.2);--radius:16px;--radius-sm:10px}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh}
.admin-header{background:rgba(19,19,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:15px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-logo{display:flex;align-items:center;gap:10px}
.admin-logo span:first-child{font-size:1.3rem}
.admin-logo span:nth-child(2){font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-logo small{background:rgba(239,68,68,0.2);color:#ef4444;padding:2px 10px;border-radius:50px;font-size:0.7rem;font-weight:600;margin-left:10px}
.admin-nav{display:flex;gap:8px}
.admin-nav a,.admin-nav button{padding:8px 16px;background:rgba(139,92,246,0.1);border:1px solid var(--border);border-radius:50px;color:var(--text-dim);text-decoration:none;font-size:0.85rem;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif}
.admin-nav a:hover,.admin-nav button:hover{background:rgba(139,92,246,0.3);color:var(--text-bright);border-color:var(--primary)}
.admin-container{max-width:1200px;margin:0 auto;padding:30px 20px}
.admin-tabs{display:flex;gap:8px;margin-bottom:30px;flex-wrap:wrap}
.admin-tab{padding:10px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;transition:0.3s;font-size:0.9rem;font-family:'Inter',sans-serif}
.admin-tab:hover,.admin-tab.active{background:rgba(139,92,246,0.2);color:var(--text-bright);border-color:var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:30px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;text-align:center}
.stat-icon{font-size:2rem;margin-bottom:10px}
.stat-value{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:0.85rem;color:var(--text-dim);margin-top:5px}
.admin-table-container{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg-card)}
th{background:rgba(139,92,246,0.1);padding:12px 15px;text-align:left;font-size:0.8rem;text-transform:uppercase;color:var(--primary-light);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 15px;border-bottom:1px solid rgba(139,92,246,0.08);font-size:0.9rem}
tr:hover td{background:rgba(139,92,246,0.05)}
.status-badge{padding:4px 12px;border-radius:50px;font-size:0.75rem;font-weight:600;display:inline-block}
.status-badge.completed{background:rgba(34,197,94,0.2);color:#22c55e}
.status-badge.cancelled{background:rgba(239,68,68,0.2);color:#ef4444}
.status-badge.pending{background:rgba(245,158,11,0.2);color:#f59e0b}
.action-btn{padding:5px 10px;border:1px solid var(--border);background:rgba(139,92,246,0.1);color:var(--text);border-radius:6px;cursor:pointer;font-size:0.8rem;margin:2px;transition:0.3s}
.action-btn:hover{background:var(--primary);color:white}
.action-btn.danger{border-color:rgba(239,68,68,0.3);color:#ef4444}
.action-btn.danger:hover{background:#ef4444;color:white}
.action-btn.success{border-color:rgba(34,197,94,0.3);color:#22c55e}
.action-btn.success:hover{background:#22c55e;color:white}
select.status-select{padding:5px 10px;background:rgba(139,92,246,0.1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;cursor:pointer}
select.status-select option{background:var(--bg-card)}
.add-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;margin-top:20px}
.add-form h3{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--accent);margin-bottom:15px}
.add-form .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.add-form input{flex:1;padding:10px;background:rgba(139,92,246,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);min-width:150px;font-family:'Inter',sans-serif}
.add-form input:focus{outline:none;border-color:var(--primary)}
.btn-save{padding:10px 20px;background:var(--gradient);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;transition:0.3s}
.btn-save:hover{transform:translateY(-2px)}
.no-auth{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.no-auth-content{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:50px;max-width:400px}
.no-auth-content h2{font-family:'Orbitron',sans-serif;color:#ef4444;margin-bottom:15px}
.no-auth-content p{color:var(--text-dim);margin-bottom:20px}
.no-auth-content a{display:inline-block;padding:10px 30px;background:var(--gradient);color:white;text-decoration:none;border-radius:50px;font-weight:600}
.toast{position:fixed;bottom:30px;right:30px;padding:15px 25px;border-radius:10px;color:white;font-weight:500;z-index:3000;transform:translateX(120%);transition:0.3s;max-width:350px;font-size:0.9rem}
.toast.show{transform:translateX(0)}
.toast.success{background:linear-gradient(135deg,#22c55e,#16a34a)}
.toast.error{background:linear-gradient(135deg,#ef4444,#dc2626)}
.toast.info{background:var(--gradient)}
.loading-spin{text-align:center;padding:40px;color:var(--text-dim)}
@media (max-width:768px){.admin-header{flex-direction:column;gap:10px;padding:10px 15px}.admin-nav{flex-wrap:wrap;justify-content:center}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="adminApp"><div class="loading-spin"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div></div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://lsievokkismxxaiezdlm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzaWV2b2traXNteHhhaWV6ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjY0NzgsImV4cCI6MjA5NzAwMjQ3OH0.TZ6_NlpDIrl6xDucsc8S4hqA23RQVWsVLrQRjtr6YmQ';
let sb = null;

try {
    if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) { console.error(e); }

function getUser() { try { return JSON.parse(localStorage.getItem('knox_user')); } catch { return null; } }
function fm(n) { return new Intl.NumberFormat('vi-VN').format(n || 0) + 'đ'; }
function toast(msg, type='info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
}

function checkAdmin() {
    const u = getUser();
    if (!u || !u.isAdmin) {
        document.getElementById('adminApp').innerHTML = `
            <div class="no-auth">
                <div class="no-auth-content">
                    <h2>🔒 Truy cập bị từ chối</h2>
                    <p>Cần đăng nhập với tài khoản Admin</p>
                    <a href="index.html">← Về trang chủ</a>
                </div>
            </div>`;
        return false;
    }
    return true;
}

async function render() {
    if (!checkAdmin()) return;
    if (!sb) return toast('Database lỗi!', 'error');

    const [{ data: orders }, { data: users }, { data: scripts }, { data: deposits }] = await Promise.all([
        sb.from('orders').select('*').order('created_at', { ascending: false }),
        sb.from('users').select('*').order('created_at', { ascending: false }),
        sb.from('scripts').select('*').order('id'),
        sb.from('deposits').select('*').order('created_at', { ascending: false })
    ]);

    const total = orders?.length || 0;
    const pending = orders?.filter(o => o.status === 'pending').length || 0;
    const completed = orders?.filter(o => o.status === 'completed').length || 0;
    const totalUsers = users?.length || 0;
    const pendingDeposits = deposits?.filter(d => d.status === 'pending').length || 0;
    const totalBalance = users?.reduce((sum, u) => sum + (u.balance || 0), 0) || 0;

    document.getElementById('adminApp').innerHTML = `
        <div class="admin-header">
            <div class="admin-logo"><span>⚡</span><span>KNOX</span><small>ADMIN</small></div>
            <div class="admin-nav">
                <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
                <button onclick="render()"><i class="fas fa-sync"></i> Làm mới</button>
                <button onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
        </div>
        <div class="admin-container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${total}</div><div class="stat-label">Tổng đơn</div></div>
                <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-value">${pending}</div><div class="stat-label">Đơn chờ</div></div>
                <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${completed}</div><div class="stat-label">Hoàn thành</div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" style="color:#f59e0b">${pendingDeposits}</div><div class="stat-label">Nạp chờ duyệt</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${totalUsers}</div><div class="stat-label">Người dùng</div></div>
                <div class="stat-card"><div class="stat-icon">💵</div><div class="stat-value" style="color:#22c55e;font-size:1.3rem">${fm(totalBalance)}</div><div class="stat-label">Tổng số dư</div></div>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('orders', this)"><i class="fas fa-shopping-cart"></i> Đơn hàng</button>
                <button class="admin-tab" onclick="switchTab('deposits', this)"><i class="fas fa-wallet"></i> Nạp tiền${pendingDeposits > 0 ? ` <span style="background:#ef4444;color:white;padding:2px 6px;border-radius:50px;font-size:0.7rem;margin-left:4px">${pendingDeposits}</span>` : ''}</button>
                <button class="admin-tab" onclick="switchTab('users', this)"><i class="fas fa-users"></i> Người dùng</button>
                <button class="admin-tab" onclick="switchTab('scripts', this)"><i class="fas fa-code"></i> Scripts</button>
            </div>

            <div id="tab-orders" class="tab-content active">
                <div class="admin-table-container"><table>
                    <thead><tr><th>Mã</th><th>KH</th><th>Dịch vụ</th><th>Giá</th><th>TT</th><th>Ghi chú</th><th>Thời gian</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
                    <tbody>
                        ${(orders || []).length === 0 ? '<tr><td colspan="9" style="text-align:center;color:var(--text-dim);padding:40px;">Chưa có đơn hàng</td></tr>' :
                        orders.map(o => `
                            <tr>
                                <td><strong>${o.order_code}</strong></td>
                                <td>${o.username}</td>
                                <td>${o.service}</td>
                                <td style="color:#22c55e;font-weight:600">${o.price > 0 ? fm(o.price) : '-'}</td>
                                <td>${o.payment}</td>
                                <td>${o.note || '-'}</td>
                                <td>${new Date(o.created_at).toLocaleString('vi-VN')}</td>
                                <td><select class="status-select" onchange="updStatus('${o.order_code}', this.value)">
                                    <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>⏳ Chờ</option>
                                    <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>🔄 Xử lý</option>
                                    <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>✅ Xong</option>
                                    <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>❌ Hủy</option>
                                </select></td>
                                <td><button class="action-btn danger" onclick="delOrder('${o.order_code}')"><i class="fas fa-trash"></i></button></td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>
            </div>

            <div id="tab-deposits" class="tab-content">
                <div class="admin-table-container"><table>
                    <thead><tr><th>Mã</th><th>KH</th><th>Số tiền</th><th>Phương thức</th><th>Ghi chú</th><th>Thời gian</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
                    <tbody>
                        ${(deposits || []).length === 0 ? '<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:40px;">Chưa có yêu cầu nạp</td></tr>' :
                        deposits.map(d => `
                            <tr>
                                <td><strong>${d.deposit_code}</strong></td>
                                <td>${d.username}</td>
                                <td style="color:#22c55e;font-weight:700">${fm(d.amount)}</td>
                                <td>${d.method}</td>
                                <td>${d.note || '-'}</td>
                                <td>${new Date(d.created_at).toLocaleString('vi-VN')}</td>
                                <td><span class="status-badge ${d.status}">${d.status === 'pending' ? '⏳ Chờ duyệt' : d.status === 'completed' ? '✅ Đã cộng' : '❌ Hủy'}</span></td>
                                <td>
                                    ${d.status === 'pending' ? `
                                        <button class="action-btn success" onclick="approveDeposit('${d.deposit_code}', '${d.username}', ${d.amount})"><i class="fas fa-check"></i> Duyệt</button>
                                        <button class="action-btn danger" onclick="rejectDeposit('${d.deposit_code}')"><i class="fas fa-times"></i></button>
                                    ` : `<button class="action-btn danger" onclick="delDeposit('${d.deposit_code}')"><i class="fas fa-trash"></i></button>`}
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>
            </div>

            <div id="tab-users" class="tab-content">
                <div class="admin-table-container"><table>
                    <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Zalo</th><th>Số dư</th><th>Mật khẩu</th><th>Đăng ký</th><th>Hành động</th></tr></thead>
                    <tbody>
                        ${(users || []).length === 0 ? '<tr><td colspan="8" style="text-align:center;color:var(--text-dim);padding:40px;">Chưa có user</td></tr>' :
                        users.map(u => `
                            <tr>
                                <td>${u.id}</td>
                                <td><strong>${u.username}</strong></td>
                                <td>${u.email || '-'}</td>
                                <td>${u.zalo || '-'}</td>
                                <td style="color:#22c55e;font-weight:700">${fm(u.balance || 0)}</td>
                                <td><code style="color:#f59e0b">${u.password}</code></td>
                                <td>${new Date(u.created_at).toLocaleString('vi-VN')}</td>
                                <td>
                                    <button class="action-btn success" onclick="editBalance('${u.username}', ${u.balance || 0})" title="Quản lý số dư"><i class="fas fa-coins"></i> Tiền</button>
                                    <button class="action-btn danger" onclick="delUser(${u.id})"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>
            </div>

            <div id="tab-scripts" class="tab-content">
                <div class="admin-table-container"><table>
                    <thead><tr><th>ID</th><th>Tên</th><th>Game</th><th>Giá</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
                    <tbody>
                        ${(scripts || []).map(s => `
                            <tr>
                                <td>${s.id}</td>
                                <td><strong>${s.name}</strong></td>
                                <td>${s.game}</td>
                                <td>${s.price}</td>
                                <td><span class="status-badge ${s.active ? 'completed' : 'cancelled'}">${s.active ? 'Đang bán' : 'Tạm dừng'}</span></td>
                                <td>
                                    <button class="action-btn" onclick="togScript(${s.id}, ${s.active})"><i class="fas fa-${s.active ? 'pause' : 'play'}"></i></button>
                                    <button class="action-btn danger" onclick="delScript(${s.id})"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>`).join('')}
                    </tbody>
                </table></div>
                <div class="add-form">
                    <h3>➕ Thêm Script mới</h3>
                    <div class="form-row">
                        <input type="text" id="newName" placeholder="Tên (VD: Blox Fruits)">
                        <input type="text" id="newGame" placeholder="Game (VD: Roblox)">
                        <input type="text" id="newPrice" placeholder="Giá (VD: 20.000đ)">
                    </div>
                    <button class="btn-save" onclick="addScript()"><i class="fas fa-plus"></i> Thêm</button>
                </div>
            </div>
        </div>`;
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
}

async function updStatus(code, status) {
    const { error } = await sb.from('orders').update({ status }).eq('order_code', code);
    if (error) toast('Lỗi: ' + error.message, 'error');
    else toast(`Cập nhật ${code}`, 'success');
}
async function delOrder(code) {
    if (!confirm('Xóa đơn ' + code + '?')) return;
    const { error } = await sb.from('orders').delete().eq('order_code', code);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã xóa', 'success'); render(); }
}
async function delUser(id) {
    if (!confirm('Xóa user?')) return;
    const { error } = await sb.from('users').delete().eq('id', id);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã xóa', 'success'); render(); }
}
async function addScript() {
    const name = document.getElementById('newName').value.trim();
    const game = document.getElementById('newGame').value.trim();
    const price = document.getElementById('newPrice').value.trim();
    if (!name || !game || !price) return toast('Điền đầy đủ!', 'error');
    const { error } = await sb.from('scripts').insert([{ name, game, price, active: true }]);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã thêm', 'success'); render(); }
}
async function togScript(id, active) {
    const { error } = await sb.from('scripts').update({ active: !active }).eq('id', id);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã cập nhật', 'success'); render(); }
}
async function delScript(id) {
    if (!confirm('Xóa script?')) return;
    const { error } = await sb.from('scripts').delete().eq('id', id);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã xóa', 'success'); render(); }
} async function approveDeposit(code, username, amount) {
    if (!confirm(`Duyệt nạp ${fm(amount)} cho ${username}?`)) return;
    try {
        const { data: user } = await sb.from('users').select('balance, total_deposited').eq('username', username).maybeSingle();
        if (!user) return toast('Không tìm thấy user!', 'error');
        
        const newBalance = (user.balance || 0) + amount;
        const newTotal = (user.total_deposited || 0) + amount;
        
        await sb.from('users').update({ 
            balance: newBalance, 
            total_deposited: newTotal 
        }).eq('username', username);
        
        await sb.from('deposits').update({ status: 'completed' }).eq('deposit_code', code);
        
        // Tạo thông báo cho user
        await sb.from('notifications').insert([{
            username: username,
            title: '💰 Nạp tiền thành công',
            message: `Đã cộng ${fm(amount)} vào tài khoản. Số dư mới: ${fm(newBalance)}`,
            type: 'success'
        }]);
        
        toast(`✅ Đã cộng ${fm(amount)} cho ${username}!`, 'success');
        await render();
    } catch (e) {
        toast('Lỗi: ' + e.message, 'error');
    }
}
async function rejectDeposit(code) {
    if (!confirm('Từ chối yêu cầu này?')) return;
    const { error } = await sb.from('deposits').update({ status: 'cancelled' }).eq('deposit_code', code);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã từ chối', 'info'); render(); }
}

async function delDeposit(code) {
    if (!confirm('Xóa yêu cầu nạp này?')) return;
    const { error } = await sb.from('deposits').delete().eq('deposit_code', code);
    if (error) toast('Lỗi', 'error');
    else { toast('Đã xóa', 'success'); render(); }
}

async function editBalance(username, currentBalance) {
    const action = prompt(
        `📝 Quản lý số dư: ${username}\n` +
        `Số dư hiện tại: ${fm(currentBalance)}\n\n` +
        `Nhập số tiền:\n` +
        `• Số dương = CỘNG thêm (VD: 50000)\n` +
        `• Số âm = TRỪ bớt (VD: -20000)\n` +
        `• "=" trước số = ĐẶT số dư mới (VD: =1000000)`,
        ''
    );

    if (action === null || action === '') return;
    
    let newBalance;
    let actionType;
    let amount;
    
    if (action.startsWith('=')) {
        newBalance = parseInt(action.substring(1));
        if (isNaN(newBalance) || newBalance < 0) return toast('Số không hợp lệ!', 'error');
        amount = newBalance - currentBalance;
        actionType = 'đặt thành';
    } else {
        amount = parseInt(action);
        if (isNaN(amount)) return toast('Số không hợp lệ!', 'error');
        newBalance = currentBalance + amount;
        if (newBalance < 0) return toast('Số dư không thể âm!', 'error');
        actionType = amount >= 0 ? 'cộng' : 'trừ';
    }
    
    if (!confirm(
        `Xác nhận:\n` +
        `User: ${username}\n` +
        `Số dư cũ: ${fm(currentBalance)}\n` +
        `${actionType.toUpperCase()}: ${fm(Math.abs(amount))}\n` +
        `Số dư mới: ${fm(newBalance)}\n\n` +
        `Tiếp tục?`
    )) return;
    
    try {
        const { data, error } = await sb.from('users')
            .update({ balance: newBalance })
            .eq('username', username)
            .select();
        
        if (error) {
            toast('❌ Lỗi: ' + error.message, 'error');
            console.error('Update error:', error);
        } else if (!data || data.length === 0) {
            toast('❌ Không update được! Kiểm tra RLS policy', 'error');
        } else {
            toast(`✅ Đã ${actionType} ${fm(Math.abs(amount))} cho ${username}! Số dư mới: ${fm(newBalance)}`, 'success');
            console.log('Updated user:', data);
            await render();
        }
    } catch (e) {
        toast('❌ Lỗi exception: ' + e.message, 'error');
        console.error(e);
    }
}

function adminLogout() {
    localStorage.removeItem('knox_user');
    window.location.href = 'index.html';
}

render();
setInterval(render, 30000);
</script>
</body>
</html>
