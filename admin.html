<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOX Admin Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#8b5cf6;--primary-light:#a78bfa;--accent:#c084fc;--gradient:linear-gradient(135deg,#06b6d4,#8b5cf6,#c084fc);--bg-dark:#0a0a0f;--bg-card:#13131a;--text:#e2e8f0;--text-dim:#94a3b8;--text-bright:#f8fafc;--border:rgba(139,92,246,0.2);--radius:16px;--radius-sm:10px}
body{font-family:'Inter',sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh}
.admin-header{background:rgba(19,19,26,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:15px 30px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-logo{display:flex;align-items:center;gap:10px}
.admin-logo span:first-child{font-size:1.3rem}
.admin-logo span:nth-child(2){font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-logo small{background:rgba(239,68,68,0.2);color:#ef4444;padding:2px 10px;border-radius:50px;font-size:0.7rem;font-weight:600;margin-left:10px}
.admin-nav{display:flex;gap:8px;flex-wrap:wrap}
.admin-nav a,.admin-nav button{padding:8px 16px;background:rgba(139,92,246,0.1);border:1px solid var(--border);border-radius:50px;color:var(--text-dim);text-decoration:none;font-size:0.85rem;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif}
.admin-nav a:hover,.admin-nav button:hover{background:rgba(139,92,246,0.3);color:var(--text-bright);border-color:var(--primary)}
.admin-container{max-width:1400px;margin:0 auto;padding:30px 20px}
.admin-tabs{display:flex;gap:6px;margin-bottom:30px;flex-wrap:wrap}
.admin-tab{padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);cursor:pointer;transition:0.3s;font-size:0.85rem;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}
.admin-tab:hover,.admin-tab.active{background:rgba(139,92,246,0.2);color:var(--text-bright);border-color:var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:30px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:0.3s}
.stat-card:hover{border-color:var(--primary);transform:translateY(-3px)}
.stat-icon{font-size:1.8rem;margin-bottom:8px}
.stat-value{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:0.8rem;color:var(--text-dim);margin-top:5px}
.chart-container{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;margin-bottom:20px;position:relative;height:400px}
.chart-container h3{font-family:'Orbitron',sans-serif;color:var(--accent);margin-bottom:15px}
.chart-controls{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.chart-btn{padding:6px 12px;background:rgba(139,92,246,0.1);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:0.85rem;font-family:'Inter',sans-serif}
.chart-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
.admin-table-container{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg-card);min-width:800px}
th{background:rgba(139,92,246,0.1);padding:12px 15px;text-align:left;font-size:0.8rem;text-transform:uppercase;color:var(--primary-light);letter-spacing:1px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
td{padding:12px 15px;border-bottom:1px solid rgba(139,92,246,0.08);font-size:0.9rem;vertical-align:top}
tr:hover td{background:rgba(139,92,246,0.05)}
.status-badge{padding:4px 12px;border-radius:50px;font-size:0.75rem;font-weight:600;display:inline-block}
.status-badge.completed,.status-badge.approved,.status-badge.answered{background:rgba(34,197,94,0.2);color:#22c55e}
.status-badge.cancelled,.status-badge.rejected{background:rgba(239,68,68,0.2);color:#ef4444}
.status-badge.pending,.status-badge.open{background:rgba(245,158,11,0.2);color:#f59e0b}
.status-badge.processing{background:rgba(6,182,212,0.2);color:#06b6d4}
.action-btn{padding:5px 10px;border:1px solid var(--border);background:rgba(139,92,246,0.1);color:var(--text);border-radius:6px;cursor:pointer;font-size:0.8rem;margin:2px;transition:0.3s;display:inline-flex;align-items:center;gap:4px}
.action-btn:hover{background:var(--primary);color:white}
.action-btn.danger{border-color:rgba(239,68,68,0.3);color:#ef4444}
.action-btn.danger:hover{background:#ef4444;color:white}
.action-btn.success{border-color:rgba(34,197,94,0.3);color:#22c55e}
.action-btn.success:hover{background:#22c55e;color:white}
.action-btn.warning{border-color:rgba(245,158,11,0.3);color:#f59e0b}
.action-btn.warning:hover{background:#f59e0b;color:white}
select.status-select,input.progress-input{padding:5px 10px;background:rgba(139,92,246,0.1);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.8rem;cursor:pointer;font-family:'Inter',sans-serif}
select.status-select option{background:var(--bg-card)}
input.progress-input{width:80px}
.add-form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:25px;margin-top:20px}
.add-form h3{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--accent);margin-bottom:15px}
.add-form .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.add-form input,.add-form select,.add-form textarea{flex:1;padding:10px;background:rgba(139,92,246,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);min-width:150px;font-family:'Inter',sans-serif}
.add-form textarea{width:100%;min-height:60px;resize:vertical}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{outline:none;border-color:var(--primary)}
.btn-save{padding:10px 20px;background:var(--gradient);color:white;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px}
.btn-save:hover{transform:translateY(-2px)}
.toolbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:200px;padding:10px;background:rgba(139,92,246,0.05);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif}
.toolbar button{padding:10px 16px;background:rgba(139,92,246,0.1);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}
.toolbar button:hover{background:var(--primary);color:white}
.toolbar button.export{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#22c55e}
.toolbar button.export:hover{background:#22c55e;color:white}
.card-info-row{font-family:monospace;background:rgba(245,158,11,0.05);padding:5px 8px;border-radius:4px;font-size:0.8rem;color:#f59e0b;margin:2px 0;cursor:pointer}
.card-info-row:hover{background:rgba(245,158,11,0.15)}
.game-info-admin{background:rgba(168,85,247,0.1);border:1px solid var(--primary);border-radius:6px;padding:8px;margin-top:5px;font-size:0.8rem}
.game-info-admin strong{color:var(--accent);display:block;margin-bottom:4px}
.game-info-admin code{color:#fff;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:monospace;cursor:pointer;display:inline-block;margin:2px 0}
.game-info-admin code:hover{background:var(--primary)}
.reject-info-admin{background:rgba(239,68,68,0.1);border:1px solid #ef4444;padding:5px 8px;border-radius:4px;margin-top:5px;color:#ef4444;font-size:0.75rem}
.alert-warning{background:rgba(245,158,11,0.1);border:1px solid #f59e0b;color:#f59e0b;padding:12px;border-radius:var(--radius-sm);margin-bottom:15px}
.no-auth{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.no-auth-content{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:50px;max-width:400px}
.no-auth-content h2{font-family:'Orbitron',sans-serif;color:#ef4444;margin-bottom:15px}
.no-auth-content p{color:var(--text-dim);margin-bottom:20px}
.no-auth-content a{display:inline-block;padding:10px 30px;background:var(--gradient);color:white;text-decoration:none;border-radius:50px;font-weight:600}
.toast{position:fixed;bottom:30px;right:30px;padding:15px 25px;border-radius:10px;color:white;font-weight:500;z-index:3000;transform:translateX(120%);transition:0.3s;max-width:350px;font-size:0.9rem}
.toast.show{transform:translateX(0)}
.toast.success{background:linear-gradient(135deg,#22c55e,#16a34a)}
.toast.error{background:linear-gradient(135deg,#ef4444,#dc2626)}
.toast.info{background:var(--gradient)}
.loading-spin{text-align:center;padding:40px;color:var(--text-dim)}
@media (max-width:768px){
.admin-header{flex-direction:column;gap:10px;padding:10px 15px}
.admin-nav{flex-wrap:wrap;justify-content:center}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.chart-container{height:300px}
}
</style>
</head>
<body>
<div id="adminApp"><div class="loading-spin"><i class="fas fa-spinner fa-spin"></i> Đang tải...</div></div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL='https://lsievokkismxxaiezdlm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzaWV2b2traXNteHhhaWV6ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjY0NzgsImV4cCI6MjA5NzAwMjQ3OH0.TZ6_NlpDIrl6xDucsc8S4hqA23RQVWsVLrQRjtr6YmQ';
let sb=null,chart=null,chartPeriod='week';

try{if(window.supabase)sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}catch(e){}

function getUser(){try{return JSON.parse(localStorage.getItem('knox_user'))}catch{return null}}
function fm(n){return new Intl.NumberFormat('vi-VN').format(n||0)+'đ'}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3500)}
function copyText(text){if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>toast('Đã copy!','success'))}

async function adminLog(action,target='',details=''){
    if(!sb)return;
    try{await sb.from('admin_logs').insert([{action,target,details}])}catch(e){}
}

function checkAdmin(){
    const u=getUser();
    if(!u||!u.isAdmin){
        document.getElementById('adminApp').innerHTML=`<div class="no-auth"><div class="no-auth-content"><h2>🔒 Truy cập từ chối</h2><p>Cần đăng nhập với tài khoản Admin</p><a href="index.html">← Về trang chủ</a></div></div>`;
        return false;
    }
    return true;
}

async function render(){
    if(!checkAdmin())return;
    if(!sb)return toast('Database lỗi!','error');

    const[O,U,S,D,V,R,T,L,C,B,A,H]=await Promise.all([
        sb.from('orders').select('*').order('created_at',{ascending:false}),
        sb.from('users').select('*').order('created_at',{ascending:false}),
        sb.from('scripts').select('*').order('id'),
        sb.from('deposits').select('*').order('created_at',{ascending:false}),
        sb.from('vouchers').select('*').order('id',{ascending:false}),
        sb.from('reviews').select('*').order('created_at',{ascending:false}),
        sb.from('tickets').select('*').order('created_at',{ascending:false}),
        sb.from('login_history').select('*').order('created_at',{ascending:false}).limit(100),
        sb.from('card_deposits').select('*').order('created_at',{ascending:false}),
        sb.from('broadcasts').select('*').order('created_at',{ascending:false}).limit(20),
        sb.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(100),
        sb.from('hot_deals').select('*').order('id',{ascending:false})
    ]);

    const orders=O.data||[],users=U.data||[],scripts=S.data||[],deposits=D.data||[];
    const vouchers=V.data||[],reviews=R.data||[],tickets=T.data||[],loginHist=L.data||[];
    const cards=C.data||[],broadcasts=B.data||[],logs=A.data||[],hotDeals=H.data||[];

    const totalOrders=orders.length;
    const pending=orders.filter(o=>o.status==='pending').length;
    const completed=orders.filter(o=>o.status==='completed').length;
    const pendingDeps=deposits.filter(d=>d.status==='pending').length;
    const pendingCards=cards.filter(c=>c.status==='pending').length;
    const openTickets=tickets.filter(t=>t.status==='open').length;
    const totalBalance=users.reduce((s,u)=>s+(u.balance||0),0);
    const totalRevenue=orders.filter(o=>o.status==='completed').reduce((s,o)=>s+(o.price||0),0);
    const lockedUsers=users.filter(u=>u.is_locked).length;

    document.getElementById('adminApp').innerHTML=`
    <div class="admin-header">
        <div class="admin-logo"><span>⚡</span><span>KNOX</span><small>ADMIN PRO</small></div>
        <div class="admin-nav">
            <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
            <button onclick="render()"><i class="fas fa-sync"></i> Làm mới</button>
            <button onclick="backupDB()"><i class="fas fa-download"></i> Backup</button>
            <button onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </div>
    </div>
    <div class="admin-container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${totalOrders}</div><div class="stat-label">Tổng đơn</div></div>
            <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-value" style="color:#f59e0b">${pending}</div><div class="stat-label">Đơn chờ</div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:#22c55e">${completed}</div><div class="stat-label">Hoàn thành</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value" style="color:#f59e0b">${pendingDeps}</div><div class="stat-label">Nạp chờ</div></div>
            <div class="stat-card"><div class="stat-icon">💳</div><div class="stat-value" style="color:#06b6d4">${pendingCards}</div><div class="stat-label">Thẻ chờ check</div></div>
            <div class="stat-card"><div class="stat-icon">🎫</div><div class="stat-value" style="color:#ef4444">${openTickets}</div><div class="stat-label">Ticket mở</div></div>
            <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${users.length}</div><div class="stat-label">Tổng user (${lockedUsers} khóa)</div></div>
            <div class="stat-card"><div class="stat-icon">💵</div><div class="stat-value" style="color:#22c55e;font-size:1.1rem">${fm(totalRevenue)}</div><div class="stat-label">Doanh thu</div></div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('chart',this)"><i class="fas fa-chart-line"></i> Biểu đồ</button>
            <button class="admin-tab" onclick="switchTab('orders',this)"><i class="fas fa-shopping-cart"></i> Đơn hàng</button>
            <button class="admin-tab" onclick="switchTab('deposits',this)"><i class="fas fa-wallet"></i> Nạp tiền${pendingDeps>0?` <span style="background:#ef4444;color:white;padding:2px 6px;border-radius:50px;font-size:0.7rem">${pendingDeps}</span>`:''}</button>
            <button class="admin-tab" onclick="switchTab('cards',this)"><i class="fas fa-credit-card"></i> Thẻ cào${pendingCards>0?` <span style="background:#ef4444;color:white;padding:2px 6px;border-radius:50px;font-size:0.7rem">${pendingCards}</span>`:''}</button>
            <button class="admin-tab" onclick="switchTab('tickets',this)"><i class="fas fa-headset"></i> Hỗ trợ${openTickets>0?` <span style="background:#ef4444;color:white;padding:2px 6px;border-radius:50px;font-size:0.7rem">${openTickets}</span>`:''}</button>
            <button class="admin-tab" onclick="switchTab('users',this)"><i class="fas fa-users"></i> Người dùng</button>
            <button class="admin-tab" onclick="switchTab('scripts',this)"><i class="fas fa-code"></i> Scripts</button>
            <button class="admin-tab" onclick="switchTab('hotdeals',this)"><i class="fas fa-fire"></i> Hot Deals</button>
            <button class="admin-tab" onclick="switchTab('vouchers',this)"><i class="fas fa-ticket-alt"></i> Voucher</button>
            <button class="admin-tab" onclick="switchTab('reviews',this)"><i class="fas fa-star"></i> Đánh giá</button>
            <button class="admin-tab" onclick="switchTab('broadcast',this)"><i class="fas fa-bullhorn"></i> Broadcast</button>
            <button class="admin-tab" onclick="switchTab('logins',this)"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
            <button class="admin-tab" onclick="switchTab('logs',this)"><i class="fas fa-history"></i> Logs</button>
        </div>

        <div id="tab-chart" class="tab-content active">
            <div class="chart-container">
                <h3><i class="fas fa-chart-line"></i> Doanh thu</h3>
                <div class="chart-controls">
                    <button class="chart-btn ${chartPeriod==='week'?'active':''}" onclick="changePeriod('week')">7 ngày</button>
                    <button class="chart-btn ${chartPeriod==='month'?'active':''}" onclick="changePeriod('month')">30 ngày</button>
                    <button class="chart-btn ${chartPeriod==='year'?'active':''}" onclick="changePeriod('year')">12 tháng</button>
                </div>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div id="tab-orders" class="tab-content">
            <div class="alert-warning"><i class="fas fa-info-circle"></i> <strong>Lưu ý:</strong> Khi chọn trạng thái "❌ Hủy" → Hệ thống sẽ yêu cầu nhập <strong>LÝ DO</strong> và <strong>TỰ ĐỘNG HOÀN TIỀN</strong> cho khách!</div>
            <div class="toolbar">
                <input type="text" id="searchOrder" placeholder="🔍 Tìm theo mã/username..." oninput="filterTable('orderTable',this.value)">
                <button class="export" onclick='exportExcel("orders",${JSON.stringify(orders).replace(/"/g,"&quot;")})'><i class="fas fa-file-excel"></i> Xuất Excel</button>
            </div>
            <div class="admin-table-container"><table id="orderTable">

function drawChart(deposits){
    const canvas=document.getElementById('revenueChart');
    if(!canvas)return;
    if(chart)chart.destroy();
    const now=new Date();
    let labels=[],data=[];
    const completed=deposits.filter(d=>d.status==='completed');
    if(chartPeriod==='week'){
        for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];labels.push(d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}));data.push(completed.filter(c=>c.created_at.startsWith(ds)).reduce((s,c)=>s+c.amount,0))}
    }else if(chartPeriod==='month'){
        for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];labels.push(d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}));data.push(completed.filter(c=>c.created_at.startsWith(ds)).reduce((s,c)=>s+c.amount,0))}
    }else{
        for(let i=11;i>=0;i--){const d=new Date(now);d.setMonth(d.getMonth()-i);const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;labels.push(`T${d.getMonth()+1}/${d.getFullYear()}`);data.push(completed.filter(c=>c.created_at.startsWith(ym)).reduce((s,c)=>s+c.amount,0))}
    }
    chart=new Chart(canvas,{type:'line',data:{labels,datasets:[{label:'Doanh thu (VNĐ)',data,backgroundColor:'rgba(139,92,246,0.2)',borderColor:'#8b5cf6',borderWidth:3,fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e2e8f0'}}},scales:{y:{ticks:{color:'#94a3b8',callback:v=>new Intl.NumberFormat('vi-VN').format(v)+'đ'},grid:{color:'rgba(139,92,246,0.1)'}},x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(139,92,246,0.1)'}}}}});
}

function changePeriod(p){chartPeriod=p;render()}
function switchTab(tab,btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active')}
function filterTable(tableId,query){const t=document.getElementById(tableId);if(!t)return;const rows=t.querySelectorAll('tbody tr');const q=query.toLowerCase();rows.forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none'})}
function exportExcel(name,data){const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,name);XLSX.writeFile(wb,`KNOX_${name}_${Date.now()}.xlsx`);adminLog('EXPORT',name);toast('✅ Đã xuất Excel!','success')}

async function backupDB(){
    if(!sb)return;toast('Đang backup...','info');
    try{
        const tables=['users','orders','deposits','scripts','vouchers','reviews','tickets','card_deposits','hot_deals','notifications'];
        const backup={};
        for(const t of tables){const{data}=await sb.from(t).select('*');backup[t]=data}
        const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=`KNOX_backup_${Date.now()}.json`;a.click();
        adminLog('BACKUP','database');toast('✅ Đã backup!','success');
    }catch(e){toast('Lỗi: '+e.message,'error')}
}

async function updStatus(code,status){
    if(status==='cancelled'){
        const reason=prompt('❌ Nhập LÝ DO TỪ CHỐI (sẽ hiện cho khách):\n\nVD:\n- Sai thông tin tài khoản game\n- Tài khoản đã bị ban\n- Không thể đăng nhập\n- Mật khẩu sai','Sai thông tin tài khoản game');
        if(!reason){render();return}
        try{
            const{data:order}=await sb.from('orders').select('username, price, status').eq('order_code',code).maybeSingle();
            if(!order)return toast('Không tìm thấy đơn!','error');
            if(order.status!=='cancelled'&&order.price>0){
                const{data:user}=await sb.from('users').select('balance').eq('username',order.username).maybeSingle();
                if(user){
                    const newBalance=(user.balance||0)+order.price;
                    await sb.from('users').update({balance:newBalance}).eq('username',order.username);
                    await sb.from('notifications').insert([{
                        username:order.username,
                        title:'❌ Đơn hàng bị từ chối',
                        message:`Đơn ${code} bị từ chối. Lý do: ${reason}. Đã hoàn ${fm(order.price)} vào ví.`
                    }]);
                }
            }
            await sb.from('orders').update({status:'cancelled',reject_reason:reason,progress:0}).eq('order_code',code);
            adminLog('REJECT_ORDER',code,reason);
            toast(`✅ Đã từ chối & hoàn ${fm(order.price)}`,'success');
            render();
        }catch(e){toast('Lỗi: '+e.message,'error')}
        return;
    }
    const{error}=await sb.from('orders').update({status,progress:status==='completed'?100:status==='processing'?50:0}).eq('order_code',code);
    if(error)toast('Lỗi','error');
    else{
        adminLog('UPDATE_ORDER',code,'Status: '+status);
        toast(`Cập nhật ${code}`,'success');
        const{data:order}=await sb.from('orders').select('username, service').eq('order_code',code).maybeSingle();
        if(order){
            const statusText={pending:'⏳ Chờ xử lý',processing:'🔄 Đang xử lý',completed:'✅ Hoàn thành'}[status]||status;
            await sb.from('notifications').insert([{
                username:order.username,
                title:`📦 Cập nhật đơn ${code}`,
                message:`Đơn "${order.service}" đã chuyển sang: ${statusText}`
            }]);
        }
        render();
    }
}

async function updProgress(code,p){await sb.from('orders').update({progress:parseInt(p)}).eq('order_code',code);toast(`Tiến độ: ${p}%`,'success')}
async function updDownload(code,link){await sb.from('orders').update({download_link:link}).eq('order_code',code);adminLog('UPDATE_DOWNLOAD',code);toast('✅ Đã cập nhật link','success')}
async function delOrder(code){if(!confirm('Xóa đơn '+code+'?'))return;await sb.from('orders').delete().eq('order_code',code);adminLog('DELETE_ORDER',code);toast('Đã xóa','success');render()}
async function delUser(id){if(!confirm('Xóa user?'))return;await sb.from('users').delete().eq('id',id);adminLog('DELETE_USER',id.toString());toast('Đã xóa','success');render()}

async function toggleLock(username,isLocked){
    const lock=!isLocked;
    await sb.from('users').update({is_locked:lock}).eq('username',username);
    if(lock)await sb.from('notifications').insert([{username,title:'🔒 Tài khoản bị khóa',message:'Tài khoản đã bị khóa. Liên hệ admin.'}]);
    else await sb.from('notifications').insert([{username,title:'🔓 Tài khoản mở khóa',message:'Tài khoản đã được mở khóa.'}]);
    adminLog(lock?'LOCK_USER':'UNLOCK_USER',username);
    toast(`✅ Đã ${lock?'khóa':'mở khóa'}`,'success');render();
}

async function resetPass(username){
    const newP=prompt(`Mật khẩu mới cho ${username}:`,'123456');
    if(!newP||newP.length<6)return;
    await sb.from('users').update({password:newP}).eq('username',username);
    await sb.from('notifications').insert([{username,title:'🔑 Reset mật khẩu',message:`Admin đã reset mật khẩu. MK mới: ${newP}`}]);
    adminLog('RESET_PASSWORD',username);
    toast(`✅ Reset MK: ${newP}`,'success');render();
}

async function addScript(){const name=document.getElementById('newName').value.trim();const game=document.getElementById('newGame').value.trim();const price=document.getElementById('newPrice').value.trim();if(!name||!game||!price)return toast('Điền đầy đủ!','error');await sb.from('scripts').insert([{name,game,price,active:true}]);adminLog('ADD_SCRIPT',name);toast('Đã thêm','success');render()}
async function togScript(id,active){await sb.from('scripts').update({active:!active}).eq('id',id);toast('Đã cập nhật','success');render()}
async function delScript(id){if(!confirm('Xóa script?'))return;await sb.from('scripts').delete().eq('id',id);toast('Đã xóa','success');render()}

async function approveDeposit(code,username,amount){
    if(!confirm(`Duyệt nạp ${fm(amount)} cho ${username}?`))return;
    try{
        const{data:user}=await sb.from('users').select('balance, total_deposited').eq('username',username).maybeSingle();
        if(!user)return toast('Không tìm thấy user!','error');
        const newBal=(user.balance||0)+amount;
        const newTotal=(user.total_deposited||0)+amount;
        await sb.from('users').update({balance:newBal,total_deposited:newTotal}).eq('username',username);
        await sb.from('deposits').update({status:'completed'}).eq('deposit_code',code);
        await sb.from('notifications').insert([{username,title:'💰 Nạp tiền thành công',message:`Cộng ${fm(amount)}. Số dư: ${fm(newBal)}`}]);
        adminLog('APPROVE_DEPOSIT',code,`${username} +${fm(amount)}`);
        toast(`✅ Đã cộng ${fm(amount)} cho ${username}!`,'success');
        await render();
    }catch(e){toast('Lỗi: '+e.message,'error')}
}
async function rejectDeposit(code){if(!confirm('Từ chối yêu cầu?'))return;await sb.from('deposits').update({status:'cancelled'}).eq('deposit_code',code);adminLog('REJECT_DEPOSIT',code);toast('Đã từ chối','info');render()}
async function delDeposit(code){if(!confirm('Xóa?'))return;await sb.from('deposits').delete().eq('deposit_code',code);toast('Đã xóa','success');render()}

async function approveCard(code,username,amount){
    if(!confirm(`Duyệt thẻ ${code}? Cộng ${fm(amount)}?`))return;
    try{
        const{data:user}=await sb.from('users').select('balance, total_deposited').eq('username',username).maybeSingle();
        if(!user)return toast('Không tìm thấy user!','error');
        const newBal=(user.balance||0)+amount;
        await sb.from('users').update({balance:newBal,total_deposited:(user.total_deposited||0)+amount}).eq('username',username);
        await sb.from('card_deposits').update({status:'completed'}).eq('card_code',code);
        await sb.from('notifications').insert([{username,title:'💳 Nạp thẻ thành công',message:`Thẻ ${code} OK! Cộng ${fm(amount)}. Số dư: ${fm(newBal)}`}]);
        adminLog('APPROVE_CARD',code,`${username} +${fm(amount)}`);
        toast(`✅ Cộng ${fm(amount)}!`,'success');
        await render();
    }catch(e){toast('Lỗi: '+e.message,'error')}
}
async function rejectCard(code){
    const note=prompt('Lý do từ chối:','Sai mã hoặc seri');
    if(!note)return;
    await sb.from('card_deposits').update({status:'cancelled',admin_note:note}).eq('card_code',code);
    const{data:c}=await sb.from('card_deposits').select('username').eq('card_code',code).maybeSingle();
    if(c)await sb.from('notifications').insert([{username:c.username,title:'❌ Thẻ không hợp lệ',message:`Thẻ ${code} bị từ chối. Lý do: ${note}`}]);
    adminLog('REJECT_CARD',code,note);
    toast('Đã từ chối','info');render();
}
async function delCard(code){if(!confirm('Xóa?'))return;await sb.from('card_deposits').delete().eq('card_code',code);toast('Đã xóa','success');render()}

async function editBalance(username,currentBalance){
    const action=prompt(`📝 Số dư ${username}: ${fm(currentBalance)}\n\n• Số dương = CỘNG (VD: 50000)\n• Số âm = TRỪ (VD: -20000)\n• "=" trước = ĐẶT (VD: =1000000)`,'');
    if(!action)return;
    let newBalance,amount;
    if(action.startsWith('=')){newBalance=parseInt(action.substring(1));if(isNaN(newBalance)||newBalance<0)return toast('Sai!','error');amount=newBalance-currentBalance}
    else{amount=parseInt(action);if(isNaN(amount))return toast('Sai!','error');newBalance=currentBalance+amount;if(newBalance<0)return toast('Âm!','error')}
    if(!confirm(`${fm(currentBalance)} → ${fm(newBalance)}?`))return;
    await sb.from('users').update({balance:newBalance}).eq('username',username);
    adminLog('EDIT_BALANCE',username,`${fm(currentBalance)} → ${fm(newBalance)}`);
    toast(`✅ Cập nhật!`,'success');render();
}

async function replyTicket(code,username){
    const reply=prompt('Nhập câu trả lời:','');
    if(!reply)return;
    await sb.from('tickets').update({admin_reply:reply,status:'answered'}).eq('ticket_code',code);

    adminLog('REPLY_TICKET',code);
    toast('✅ Đã trả lời','success');render();
}
async function delTicket(code){if(!confirm('Xóa?'))return;await sb.from('tickets').delete().eq('ticket_code',code);toast('Đã xóa','success');render()}

async function addVoucher(){const code=document.getElementById('vCode').value.trim().toUpperCase();const percent=parseInt(document.getElementById('vPercent').value);const max=parseInt(document.getElementById('vMax').value)||100;if(!code||!percent)return toast('Điền đầy đủ!','error');try{await sb.from('vouchers').insert([{code,discount_percent:percent,max_uses:max,active:true}]);adminLog('ADD_VOUCHER',code);toast(`✅ Tạo voucher ${code}`,'success');render()}catch(e){toast('Code đã tồn tại!','error')}}
async function togVoucher(id,active){await sb.from('vouchers').update({active:!active}).eq('id',id);toast('Đã cập nhật','success');render()}
async function delVoucher(id){if(!confirm('Xóa?'))return;await sb.from('vouchers').delete().eq('id',id);toast('Đã xóa','success');render()}
async function delReview(id){if(!confirm('Xóa review?'))return;await sb.from('reviews').delete().eq('id',id);toast('Đã xóa','success');render()}

async function sendBroadcast(userCount){
    const title=document.getElementById('bcTitle').value.trim();
    const message=document.getElementById('bcMessage').value.trim();
    if(!title||!message)return toast('Điền đầy đủ!','error');
    if(!confirm(`Gửi cho ${userCount} user?`))return;
    try{
        const{data:users}=await sb.from('users').select('username');
        const notifs=users.map(u=>({username:u.username,title,message,type:'broadcast'}));
        await sb.from('notifications').insert(notifs);
        await sb.from('broadcasts').insert([{title,message}]);
        adminLog('BROADCAST',title);
        toast(`✅ Đã gửi cho ${userCount} user!`,'success');
        document.getElementById('bcTitle').value='';
        document.getElementById('bcMessage').value='';
        render();
    }catch(e){toast('Lỗi: '+e.message,'error')}
}

render();
setInterval(render,30000);
